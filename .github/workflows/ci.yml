name: 🚀 CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  # Job 1: Testes e Lint do Frontend
  frontend-tests:
    name: 🎨 Frontend Tests
    runs-on: ubuntu-latest
    
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4

    - name: 📦 Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'

    - name: 🔧 Install dependencies
      run: npm ci

    - name: 🧹 Run ESLint
      run: npm run lint --if-present

    - name: 🧪 Run tests
      run: npm test --if-present

    - name: 🏗️ Build frontend
      run: npm run build

    - name: 📤 Upload build artifacts
      uses: actions/upload-artifact@v5
      with:
        name: frontend-build
        path: dist/

  # Job 2: Testes do Backend
  backend-tests:
    name: 🔧 Backend Tests
    runs-on: ubuntu-latest
    
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4

    - name: 📦 Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: server/package-lock.json

    - name: 🔧 Install backend dependencies
      run: |
        cd server
        npm ci

    - name: 🧹 Run backend lint
      run: |
        cd server
        npm run lint --if-present

    - name: 🧪 Run backend tests
      run: |
        cd server
        npm test --if-present

  # Job 3: Security Audit
  security-audit:
    name: 🔒 Security Audit
    runs-on: ubuntu-latest
    
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4

    - name: 📦 Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'

    - name: 🔍 Frontend security audit
      run: |
        npm audit --audit-level=high
        
    - name: 🔍 Backend security audit
      run: |
        cd server
        npm audit --audit-level=high

  # Job 4: Deploy Preview (apenas para PRs)
  deploy-preview:
    name: 🚀 Deploy Preview
    runs-on: ubuntu-latest
    needs: [frontend-tests, backend-tests]
    if: github.event_name == 'pull_request'
    
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4

    - name: 📦 Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'

    - name: 🔧 Install dependencies
      run: npm ci

    - name: 🏗️ Build for preview
      run: npm run build
      env:
        VITE_API_BASE_URL: ${{ secrets.PREVIEW_API_URL }}

    - name: 🚀 Deploy to Vercel Preview
      uses: vercel/action@v1
      with:
        vercel-token: ${{ secrets.VERCEL_TOKEN }}
        vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
        vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}

  # Job 5: Deploy Production (apenas para push na main)
  deploy-production:
    name: 🌟 Deploy Production
    runs-on: ubuntu-latest
    needs: [frontend-tests, backend-tests, security-audit]
    if: github.ref == 'refs/heads/main'
    
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4

    - name: 📦 Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'

    - name: 🔧 Install dependencies
      run: npm ci

    - name: 🏗️ Build for production
      run: npm run build
      env:
        VITE_STRIPE_PUBLISHABLE_KEY: ${{ secrets.STRIPE_PUBLISHABLE_KEY }}
        VITE_API_BASE_URL: ${{ secrets.PRODUCTION_API_URL }}

    - name: 🚀 Deploy Frontend to Vercel
      uses: vercel/action@v1
      with:
        vercel-token: ${{ secrets.VERCEL_TOKEN }}
        vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
        vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
        vercel-args: '--prod'

    - name: 🚀 Deploy Backend to Railway
      run: |
        # Configurar deploy do backend
        echo "Backend deployment would go here"
        # railway up --service backend

  # Job 6: Notification
  notify:
    name: 📢 Notifications
    runs-on: ubuntu-latest
    needs: [deploy-production]
    if: always()
    
    steps:
    - name: 📢 Notify deployment status
      uses: 8398a7/action-slack@v3
      with:
        status: ${{ job.status }}
        channel: '#deployments'
        webhook_url: ${{ secrets.SLACK_WEBHOOK }}
      if: always()
